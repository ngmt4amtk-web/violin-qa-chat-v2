<svg xmlns="http://www.w3.org/2000/svg" width="650" height="230" viewBox="0 0 650 230" font-family="Hiragino Kaku Gothic ProN, sans-serif">
  <!-- 3区間の帯（元弓・中弓・先弓） -->
  <rect x="100" y="50" width="167" height="105" fill="#f6f1e3"/>
  <rect x="267" y="50" width="166" height="105" fill="#ece0c8"/>
  <rect x="433" y="50" width="167" height="105" fill="#f6f1e3"/>
  <!-- 区切り線 1/3・2/3 -->
  <line x1="267" y1="50" x2="267" y2="155" stroke="#8a6d3b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="433" y1="50" x2="433" y2="155" stroke="#8a6d3b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="267" y="44" font-size="13" fill="#1a1a1a" text-anchor="middle">1/3</text>
  <text x="433" y="44" font-size="13" fill="#1a1a1a" text-anchor="middle">2/3</text>
  <!-- 区間名 -->
  <text x="183" y="78" font-size="16" font-weight="bold" fill="#8a6d3b" text-anchor="middle">元弓</text>
  <text x="350" y="78" font-size="16" font-weight="bold" fill="#8a6d3b" text-anchor="middle">中弓</text>
  <text x="517" y="78" font-size="16" font-weight="bold" fill="#8a6d3b" text-anchor="middle">先弓</text>
  <!-- 弓本体 -->
  <rect x="46" y="103" width="16" height="9" fill="#1a1a1a"/>
  <path d="M 62 108 Q 350 92 590 104" fill="none" stroke="#1a1a1a" stroke-width="3"/>
  <rect x="62" y="108" width="38" height="28" fill="#1a1a1a"/>
  <polygon points="588,100 602,97 605,136 596,136" fill="#1a1a1a"/>
  <line x1="100" y1="136" x2="596" y2="136" stroke="#1a1a1a" stroke-width="2"/>
  <!-- 部位名の引き出し -->
  <text x="66" y="30" font-size="13" fill="#1a1a1a" text-anchor="middle">フロッグ</text>
  <line x1="66" y1="36" x2="78" y2="105" stroke="#1a1a1a" stroke-width="1"/>
  <text x="300" y="30" font-size="13" fill="#1a1a1a" text-anchor="middle">棹</text>
  <line x1="300" y1="36" x2="300" y2="97" stroke="#1a1a1a" stroke-width="1"/>
  <text x="615" y="30" font-size="13" fill="#1a1a1a" text-anchor="middle">先端</text>
  <line x1="612" y1="36" x2="603" y2="95" stroke="#1a1a1a" stroke-width="1"/>
  <text x="480" y="177" font-size="13" fill="#1a1a1a" text-anchor="middle">毛</text>
  <line x1="480" y1="164" x2="480" y2="139" stroke="#1a1a1a" stroke-width="1"/>
  <!-- 下半弓・上半弓ブラケット（中弓の中央=弓の半分で分割） -->
  <path d="M 100 186 L 100 195 L 348 195 L 348 186" fill="none" stroke="#8a6d3b" stroke-width="1.5"/>
  <path d="M 352 186 L 352 195 L 600 195 L 600 186" fill="none" stroke="#8a6d3b" stroke-width="1.5"/>
  <text x="224" y="216" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">下半弓</text>
  <text x="476" y="216" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">上半弓</text>
</svg>
