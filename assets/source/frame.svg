<svg xmlns="http://www.w3.org/2000/svg" width="650" height="330" viewBox="0 0 650 330" font-family="Hiragino Kaku Gothic ProN, sans-serif">
  <!-- パネル区切り -->
  <line x1="310" y1="40" x2="310" y2="315" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="4,4" stroke-opacity="0.2"/>

  <!-- ===== 左パネル：同一弦 ===== -->
  <rect x="150" y="50" width="20" height="8" fill="#1a1a1a"/>
  <text x="178" y="57" font-size="12" fill="#1a1a1a">ナット</text>
  <line x1="160" y1="58" x2="160" y2="260" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>

  <circle cx="160" cy="110" r="9" fill="#8a6d3b"/>
  <text x="160" y="114" font-size="11" font-weight="bold" fill="#f6f1e3" text-anchor="middle">1</text>

  <circle cx="160" cy="200" r="9" fill="#8a6d3b"/>
  <text x="160" y="204" font-size="11" font-weight="bold" fill="#f6f1e3" text-anchor="middle">4</text>

  <!-- ブラケット：完全4度 -->
  <line x1="135" y1="110" x2="135" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="128" y1="110" x2="135" y2="110" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="128" y1="200" x2="135" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="122" y="159" font-size="13" font-weight="bold" fill="#8a6d3b" text-anchor="end">完全4度</text>

  <text x="160" y="296" font-size="12" fill="#1a1a1a" text-anchor="middle">同一弦なら1-4は完全4度（フィッシャー）</text>

  <!-- ===== 右パネル：隣り合う2本の弦 ===== -->
  <rect x="415" y="50" width="120" height="8" fill="#1a1a1a"/>
  <text x="475" y="44" font-size="12" fill="#1a1a1a" text-anchor="middle">ナット</text>

  <line x1="430" y1="58" x2="430" y2="260" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="520" y1="58" x2="520" y2="260" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <text x="430" y="276" font-size="11" fill="#1a1a1a" text-anchor="middle">低い弦</text>
  <text x="520" y="276" font-size="11" fill="#1a1a1a" text-anchor="middle">高い弦</text>

  <circle cx="430" cy="110" r="9" fill="#8a6d3b"/>
  <text x="430" y="114" font-size="11" font-weight="bold" fill="#f6f1e3" text-anchor="middle">1</text>

  <circle cx="520" cy="200" r="9" fill="#8a6d3b"/>
  <text x="520" y="204" font-size="11" font-weight="bold" fill="#f6f1e3" text-anchor="middle">4</text>

  <!-- 手の中＝4度（手の形の対角線） -->
  <line x1="430" y1="110" x2="520" y2="200" stroke="#8a6d3b" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="418" y="159" font-size="11" fill="#8a6d3b" text-anchor="end">手の中＝4度</text>

  <!-- 弦の間＝5度 -->
  <text x="475" y="80" font-size="11" fill="#34506e" text-anchor="middle">弦の間＝5度</text>

  <!-- ブラケット：オクターブ -->
  <line x1="550" y1="110" x2="550" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="544" y1="110" x2="550" y2="110" stroke="#1a1a1a" stroke-width="1.2"/>
  <line x1="544" y1="200" x2="550" y2="200" stroke="#1a1a1a" stroke-width="1.2"/>
  <text x="558" y="159" font-size="13" font-weight="bold" fill="#8a6d3b" text-anchor="start">オクターブ</text>

  <text x="475" y="292" font-size="12" fill="#1a1a1a" text-anchor="middle">1指を下の弦へ降ろすと同じ手の形で</text>
  <text x="475" y="308" font-size="12" fill="#1a1a1a" text-anchor="middle">オクターブ（ガラミアン原典）</text>
</svg>
