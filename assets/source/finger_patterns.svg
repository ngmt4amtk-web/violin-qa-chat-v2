<svg xmlns="http://www.w3.org/2000/svg" width="650" height="360" viewBox="0 0 650 360" font-family="Hiragino Kaku Gothic ProN, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#8a6d3b"/>
    </marker>
  </defs>

  <!-- ===== パターンA：シ・ド♯・レ・ミ（半音は2-3指間） ===== -->
  <g transform="translate(96,0)">
    <circle cx="0" cy="34" r="12" fill="#1a1a1a"/>
    <text x="0" y="39" font-size="13" font-weight="bold" fill="#f6f1e3" text-anchor="middle">A</text>

    <rect x="-15" y="60" width="30" height="130" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="-18" y="56" width="36" height="8" rx="2" fill="#1a1a1a"/>

    <circle cx="0" cy="90" r="8" fill="#8a6d3b"/>
    <text x="0" y="94" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">1</text>
    <circle cx="0" cy="120" r="8" fill="#8a6d3b"/>
    <text x="0" y="124" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">2</text>
    <circle cx="0" cy="138" r="8" fill="#8a6d3b"/>
    <text x="0" y="142" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">3</text>
    <circle cx="0" cy="168" r="8" fill="#8a6d3b"/>
    <text x="0" y="172" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">4</text>

    <!-- 外枠：1指-4指（枠は不変） -->
    <path d="M -26,90 L -32,90 L -32,168 L -26,168" fill="none" stroke="#5a5a5a" stroke-width="1"/>

    <!-- 半音ブラケット 2-3指 -->
    <path d="M 22,120 L 27,120 L 27,138 L 22,138" fill="none" stroke="#8a6d3b" stroke-width="1.3"/>
    <text x="31" y="133" font-size="10.5" fill="#8a6d3b">半音</text>

    <text x="0" y="212" font-size="13" fill="#1a1a1a" text-anchor="middle">シ</text>
    <text x="0" y="230" font-size="13" fill="#1a1a1a" text-anchor="middle">ド♯</text>
    <text x="0" y="248" font-size="13" fill="#1a1a1a" text-anchor="middle">レ</text>
    <text x="0" y="266" font-size="13" fill="#1a1a1a" text-anchor="middle">ミ</text>
  </g>

  <!-- ===== パターンB：シ・ド・レ・ミ（半音は1-2指間） ===== -->
  <g transform="translate(246,0)">
    <circle cx="0" cy="34" r="12" fill="#1a1a1a"/>
    <text x="0" y="39" font-size="13" font-weight="bold" fill="#f6f1e3" text-anchor="middle">B</text>

    <rect x="-15" y="60" width="30" height="130" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="-18" y="56" width="36" height="8" rx="2" fill="#1a1a1a"/>

    <circle cx="0" cy="90" r="8" fill="#8a6d3b"/>
    <text x="0" y="94" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">1</text>
    <circle cx="0" cy="108" r="8" fill="#8a6d3b"/>
    <text x="0" y="112" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">2</text>
    <circle cx="0" cy="138" r="8" fill="#8a6d3b"/>
    <text x="0" y="142" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">3</text>
    <circle cx="0" cy="168" r="8" fill="#8a6d3b"/>
    <text x="0" y="172" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">4</text>

    <path d="M -26,90 L -32,90 L -32,168 L -26,168" fill="none" stroke="#5a5a5a" stroke-width="1"/>

    <!-- 半音ブラケット 1-2指 -->
    <path d="M 22,90 L 27,90 L 27,108 L 22,108" fill="none" stroke="#8a6d3b" stroke-width="1.3"/>
    <text x="31" y="102" font-size="10.5" fill="#8a6d3b">半音</text>

    <text x="0" y="212" font-size="13" fill="#1a1a1a" text-anchor="middle">シ</text>
    <text x="0" y="230" font-size="13" fill="#1a1a1a" text-anchor="middle">ド</text>
    <text x="0" y="248" font-size="13" fill="#1a1a1a" text-anchor="middle">レ</text>
    <text x="0" y="266" font-size="13" fill="#1a1a1a" text-anchor="middle">ミ</text>
  </g>

  <!-- ===== パターンC：シ・ド♯・レ♯・ミ（半音は3-4指間） ===== -->
  <g transform="translate(396,0)">
    <circle cx="0" cy="34" r="12" fill="#1a1a1a"/>
    <text x="0" y="39" font-size="13" font-weight="bold" fill="#f6f1e3" text-anchor="middle">C</text>

    <rect x="-15" y="60" width="30" height="130" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="-18" y="56" width="36" height="8" rx="2" fill="#1a1a1a"/>

    <circle cx="0" cy="90" r="8" fill="#8a6d3b"/>
    <text x="0" y="94" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">1</text>
    <circle cx="0" cy="120" r="8" fill="#8a6d3b"/>
    <text x="0" y="124" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">2</text>
    <circle cx="0" cy="150" r="8" fill="#8a6d3b"/>
    <text x="0" y="154" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">3</text>
    <circle cx="0" cy="168" r="8" fill="#8a6d3b"/>
    <text x="0" y="172" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">4</text>

    <path d="M -26,90 L -32,90 L -32,168 L -26,168" fill="none" stroke="#5a5a5a" stroke-width="1"/>

    <!-- 半音ブラケット 3-4指 -->
    <path d="M 22,150 L 27,150 L 27,168 L 22,168" fill="none" stroke="#8a6d3b" stroke-width="1.3"/>
    <text x="31" y="163" font-size="10.5" fill="#8a6d3b">半音</text>

    <text x="0" y="212" font-size="13" fill="#1a1a1a" text-anchor="middle">シ</text>
    <text x="0" y="230" font-size="13" fill="#1a1a1a" text-anchor="middle">ド♯</text>
    <text x="0" y="248" font-size="13" fill="#1a1a1a" text-anchor="middle">レ♯</text>
    <text x="0" y="266" font-size="13" fill="#1a1a1a" text-anchor="middle">ミ</text>
  </g>

  <!-- ===== パターンD：シ♭・ド・レ・ミ（半音は開放弦-1指間） ===== -->
  <g transform="translate(546,0)">
    <circle cx="0" cy="34" r="12" fill="#1a1a1a"/>
    <text x="0" y="39" font-size="13" font-weight="bold" fill="#f6f1e3" text-anchor="middle">D</text>

    <rect x="-15" y="60" width="30" height="130" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
    <rect x="-18" y="56" width="36" height="8" rx="2" fill="#1a1a1a"/>

    <circle cx="0" cy="78" r="8" fill="#8a6d3b"/>
    <text x="0" y="82" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">1</text>
    <circle cx="0" cy="108" r="8" fill="#8a6d3b"/>
    <text x="0" y="112" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">2</text>
    <circle cx="0" cy="138" r="8" fill="#8a6d3b"/>
    <text x="0" y="142" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">3</text>
    <circle cx="0" cy="168" r="8" fill="#8a6d3b"/>
    <text x="0" y="172" font-size="10" font-weight="bold" fill="#f6f1e3" text-anchor="middle">4</text>

    <path d="M -26,78 L -32,78 L -32,168 L -26,168" fill="none" stroke="#5a5a5a" stroke-width="1"/>

    <!-- 半音ブラケット 開放弦-1指 -->
    <path d="M 22,64 L 27,64 L 27,78 L 22,78" fill="none" stroke="#8a6d3b" stroke-width="1.3"/>
    <text x="31" y="75" font-size="10.5" fill="#8a6d3b">半音</text>

    <text x="0" y="212" font-size="13" fill="#1a1a1a" text-anchor="middle">シ♭</text>
    <text x="0" y="230" font-size="13" fill="#1a1a1a" text-anchor="middle">ド</text>
    <text x="0" y="248" font-size="13" fill="#1a1a1a" text-anchor="middle">レ</text>
    <text x="0" y="266" font-size="13" fill="#1a1a1a" text-anchor="middle">ミ</text>
  </g>

  <!-- 共通キャプション -->
  <line x1="60" y1="300" x2="590" y2="300" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="2,3"/>
  <text x="325" y="322" font-size="13.5" fill="#1a1a1a" text-anchor="middle">違いは<tspan font-weight="bold" fill="#8a6d3b">半音の位置</tspan>だけ。4指のミ（錨）は全パターンで不動</text>
  <text x="325" y="342" font-size="12" fill="#5a5a5a" text-anchor="middle">A線・第1ポジションでの4パターン</text>
</svg>
