<svg xmlns="http://www.w3.org/2000/svg" width="650" height="380" viewBox="0 0 650 380" font-family="Hiragino Kaku Gothic ProN, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#8a6d3b"/>
    </marker>
  </defs>

  <!-- ===== 原因（左端・傾いたドミノ） ===== -->
  <g transform="translate(66,164) rotate(18)">
    <rect x="-16" y="-46" width="32" height="92" rx="3" fill="#8a6d3b" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-20" r="2.6" fill="#f6f1e3"/>
    <circle cx="0" cy="20" r="2.6" fill="#f6f1e3"/>
  </g>
  <text x="66" y="232" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">握り</text>
  <text x="66" y="250" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">押しすぎ</text>

  <!-- 原因→中列 の矢印（3方向に分岐） -->
  <path d="M 92,130 C 150,90 220,72 268,58" fill="none" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 98,164 C 160,164 220,164 268,164" fill="none" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 92,198 C 150,238 220,256 268,270" fill="none" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== 中列（3枚・落ちかけの角度） ===== -->
  <!-- 指が縮む -->
  <g transform="translate(300,64) rotate(45)">
    <rect x="-11" y="-36" width="22" height="72" rx="3" fill="#8a6d3b" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-15" r="2.2" fill="#f6f1e3"/>
    <circle cx="0" cy="15" r="2.2" fill="#f6f1e3"/>
  </g>
  <text x="300" y="119" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">指が縮む</text>

  <!-- シフトが鈍る -->
  <g transform="translate(300,164) rotate(45)">
    <rect x="-11" y="-36" width="22" height="72" rx="3" fill="#8a6d3b" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-15" r="2.2" fill="#f6f1e3"/>
    <circle cx="0" cy="15" r="2.2" fill="#f6f1e3"/>
  </g>
  <text x="300" y="219" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">シフトが鈍る</text>

  <!-- ビブラートが固まる -->
  <g transform="translate(300,264) rotate(45)">
    <rect x="-11" y="-36" width="22" height="72" rx="3" fill="#8a6d3b" stroke="#1a1a1a" stroke-width="1"/>
    <circle cx="0" cy="-15" r="2.2" fill="#f6f1e3"/>
    <circle cx="0" cy="15" r="2.2" fill="#f6f1e3"/>
  </g>
  <text x="300" y="319" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">ビブラートが固まる</text>

  <!-- 中列→右列 の矢印（対応する症状へ） -->
  <path d="M 336,49 C 400,45 435,50 468,58" fill="none" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 336,149 C 400,152 435,158 468,164" fill="none" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#arrow)"/>
  <path d="M 336,249 C 400,255 435,260 468,264" fill="none" stroke="#8a6d3b" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- ===== 右列（3枚・完全に横たわる＝症状） ===== -->
  <!-- 音程が上ずる/狭くなる -->
  <rect x="474" y="49" width="110" height="30" rx="3" fill="#34506e" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="500" cy="64" r="2.6" fill="#f6f1e3"/>
  <circle cx="558" cy="64" r="2.6" fill="#f6f1e3"/>
  <text x="529" y="100" font-size="12.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">音程が上ずる</text>
  <text x="529" y="116" font-size="12.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">/ 狭くなる</text>

  <!-- 速くすると崩れる -->
  <rect x="474" y="149" width="110" height="30" rx="3" fill="#34506e" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="500" cy="164" r="2.6" fill="#f6f1e3"/>
  <circle cx="558" cy="164" r="2.6" fill="#f6f1e3"/>
  <text x="529" y="200" font-size="12.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">速くすると崩れる</text>

  <!-- 疲労・故障 -->
  <rect x="474" y="249" width="110" height="30" rx="3" fill="#34506e" stroke="#1a1a1a" stroke-width="1"/>
  <circle cx="500" cy="264" r="2.6" fill="#f6f1e3"/>
  <circle cx="558" cy="264" r="2.6" fill="#f6f1e3"/>
  <text x="529" y="300" font-size="12.5" font-weight="bold" fill="#1a1a1a" text-anchor="middle">疲労・故障</text>

  <!-- 診断＝逆向きにたどる -->
  <line x1="20" y1="344" x2="630" y2="344" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="2,3"/>
  <text x="325" y="364" font-size="12.5" fill="#5a5a5a" text-anchor="middle">診断 ＝ 矢印を逆にたどる（症状 → 中間反応 → 握り）</text>
</svg>
