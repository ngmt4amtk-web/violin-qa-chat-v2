<svg xmlns="http://www.w3.org/2000/svg" width="650" height="400" viewBox="0 0 650 400" font-family="Hiragino Kaku Gothic ProN, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 z" fill="#8a6d3b"/>
    </marker>
  </defs>

  <!-- 列見出し -->
  <text x="290" y="34" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">上行</text>
  <text x="480" y="34" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">下行</text>
  <line x1="220" y1="44" x2="220" y2="300" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="100" y1="44" x2="600" y2="44" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- 行見出し -->
  <text x="20" y="120" font-size="14" font-weight="bold" fill="#1a1a1a">身長</text>
  <text x="20" y="138" font-size="13" fill="#1a1a1a">160cm</text>
  <text x="20" y="154" font-size="13" fill="#1a1a1a">以下</text>

  <text x="20" y="248" font-size="14" font-weight="bold" fill="#1a1a1a">身長</text>
  <text x="20" y="266" font-size="13" fill="#1a1a1a">160cm</text>
  <text x="20" y="282" font-size="13" fill="#1a1a1a">超</text>
  <line x1="100" y1="172" x2="600" y2="172" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- セル：小柄×上行 -->
  <rect x="100" y="54" width="190" height="108" rx="8" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
  <text x="195" y="98" font-size="15" font-weight="bold" fill="#8a6d3b" text-anchor="middle">親指主導</text>
  <text x="195" y="130" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">72%</text>

  <!-- セル：小柄×下行 -->
  <rect x="300" y="54" width="190" height="108" rx="8" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
  <text x="395" y="98" font-size="15" font-weight="bold" fill="#8a6d3b" text-anchor="middle">親指主導</text>
  <text x="395" y="130" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">87%</text>

  <!-- セル：大柄×上行（例外＝手首主導） -->
  <rect x="100" y="182" width="190" height="108" rx="8" fill="#eef1f4" stroke="#34506e" stroke-width="1.4"/>
  <text x="195" y="226" font-size="15" font-weight="bold" fill="#34506e" text-anchor="middle">手首主導</text>
  <text x="195" y="258" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">83%</text>

  <!-- セル：大柄×下行 -->
  <rect x="300" y="182" width="190" height="108" rx="8" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
  <text x="395" y="226" font-size="15" font-weight="bold" fill="#8a6d3b" text-anchor="middle">親指主導</text>
  <text x="395" y="258" font-size="26" font-weight="bold" fill="#1a1a1a" text-anchor="middle">93%</text>

  <!-- 共通項の帯 -->
  <rect x="10" y="316" width="630" height="46" rx="6" fill="#f6f1e3" stroke="#1a1a1a" stroke-width="1"/>
  <text x="325" y="336" font-size="13.5" fill="#1a1a1a" text-anchor="middle">共通項はフォームではなく</text>
  <text x="325" y="354" font-size="13.5" font-weight="bold" fill="#8a6d3b" text-anchor="middle">移動前の減圧・着地の検証</text>

  <text x="640" y="388" font-size="11.5" fill="#5a5a5a" text-anchor="end">N=6の実測研究・法則ではなく地図（Visentin 2015）</text>
</svg>
