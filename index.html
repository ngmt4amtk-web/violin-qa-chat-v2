<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0aa45d">
  <title>バイオリンQ&Aトーク</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="assets/avatars/violinist.png">
  <link rel="stylesheet" href="styles.css?v=20260706-blocks">
</head>
<body>
  <main class="app-shell">
    <aside class="library-panel" aria-label="Q&A一覧">
      <div class="library-top">
        <p class="eyebrow">Violin Q&A 200</p>
        <h1>相談を選ぶ</h1>
        <div class="search-box">
          <input id="searchInput" type="search" placeholder="悩み・本文・話者で検索" autocomplete="off">
        </div>
      </div>

      <div class="chapter-strip" id="chapterStrip" aria-label="章フィルター"></div>

      <div class="filter-row" aria-label="深さフィルター">
        <button class="filter-chip active" type="button" data-tier="all">すべて</button>
        <button class="filter-chip" type="button" data-tier="1">軽め</button>
        <button class="filter-chip" type="button" data-tier="2">標準</button>
        <button class="filter-chip" type="button" data-tier="3">深め</button>
      </div>

      <div class="question-count" id="questionCount"></div>
      <div class="question-list" id="questionList"></div>
    </aside>

    <section class="phone-wrap" aria-label="トーク画面">
      <div class="phone">
        <header class="chat-header">
          <button class="icon-button" id="menuButton" type="button" aria-label="相談一覧を開く">
            <span></span><span></span><span></span>
          </button>
          <div class="header-title">
            <strong id="roomTitle">バイオリンQ&A相談室</strong>
            <small id="roomSub">3人の専門家が順番に答えます</small>
          </div>
        </header>

        <div class="chat-body" id="chatBody" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <div class="drawer-backdrop" id="drawerBackdrop"></div>

  <script src="data/questions.js?v=20260706-blocks"></script>
  <script src="app.js?v=20260706-blocks"></script>
</body>
</html>
